<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Library</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="script.js"></script>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">

      <div class="logo">
        <h1>The Archivist</h1>
        <h3>Your Personal Collection</h3>
      </div>
      <button class="addBtn">+ Add Book</button>
    </header>
    <main class="cardGrid">
    </main>

      <dialog id="newBookDialog">
        <h2>Add new book</h2>
        <form id="newBookForm" method="dialog">
          <div class="inputgrp">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="xyz" name="title" />
            <br />
          </div>
          <!--  -->
          <div class="inputgrp">
            <label for="author">author</label>
            <input type="text" id="author" placeholder="author" /> <br />
          </div>
          <!--  -->
          <div class="inputgrp">
            <label for="pages">Pages</label>
            <input
              type="number"
              id="pages"
              name="pages"
              placeholder="no. of pages"
            />
          </div>
          <!--  -->
          <div class="inputgrp2">
            <input type="checkbox" id="read" name="read" />
            <label for="read">I've already read</label> <br />
          </div>
          <!--  -->
          <div class="formBtns">
            <button id="save" type="submit">Save</button>
            <button id="cancelBtn" type="button">Cancel</button>
          </div>
        </form>
      </dialog>
    <footer class="footer"></footer>
  </body>
</html>
